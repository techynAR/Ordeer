services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ordeer
      POSTGRES_USER: ordeer
      POSTGRES_PASSWORD: ordeer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ordeer -d ordeer"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
